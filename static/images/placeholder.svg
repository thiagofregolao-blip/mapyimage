<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e5e7eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d1d5db;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="url(#grad)"/>

  <!-- Image icon -->
  <circle cx="60" cy="60" r="15" fill="#9ca3af" opacity="0.5"/>
  <path d="M 30 180 L 60 120 L 100 160 L 170 30 L 170 180" fill="none" stroke="#9ca3af" stroke-width="15" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

  <!-- Text -->
  <text x="100" y="100" font-family="Arial, sans-serif" font-size="16" fill="#6b7280" text-anchor="middle" opacity="0.6">
    <tspan x="100" dy="0">Sin imagen</tspan>
    <tspan x="100" dy="20" font-size="12">Cargando...</tspan>
  </text>
</svg>
